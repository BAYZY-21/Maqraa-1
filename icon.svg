<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#061E14"/>
      <stop offset="100%" style="stop-color:#1A5C45"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9A7A2E"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#E8C96A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="16" y="16" width="480" height="480" rx="88" ry="88" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <!-- Gold circle -->
  <circle cx="256" cy="230" r="150" fill="url(#gold)"/>
  <!-- Inner dark circle -->
  <circle cx="256" cy="230" r="115" fill="#0D3B2E"/>
  <!-- Book left page -->
  <rect x="190" y="175" width="58" height="80" rx="4" fill="#C9A84C"/>
  <!-- Book right page -->
  <rect x="264" y="175" width="58" height="80" rx="4" fill="#E8C96A"/>
  <!-- Book spine -->
  <rect x="250" y="170" width="12" height="90" rx="4" fill="#fff8e1"/>
  <!-- Lines on pages -->
  <line x1="200" y1="200" x2="240" y2="200" stroke="#0D3B2E" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="215" x2="240" y2="215" stroke="#0D3B2E" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="230" x2="240" y2="230" stroke="#0D3B2E" stroke-width="4" stroke-linecap="round"/>
  <line x1="272" y1="200" x2="312" y2="200" stroke="#0D3B2E" stroke-width="4" stroke-linecap="round"/>
  <line x1="272" y1="215" x2="312" y2="215" stroke="#0D3B2E" stroke-width="4" stroke-linecap="round"/>
  <line x1="272" y1="230" x2="312" y2="230" stroke="#0D3B2E" stroke-width="4" stroke-linecap="round"/>
  <!-- Arabic text بيجي -->
  <text x="256" y="420" font-family="Cairo, Arial" font-size="72" font-weight="900" fill="url(#gold)" text-anchor="middle">بيجي</text>
  <!-- Subtitle -->
  <text x="256" y="470" font-family="Cairo, Arial" font-size="28" fill="rgba(255,255,255,0.6)" text-anchor="middle">مقرأة القرآن</text>
</svg>
